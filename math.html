<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">

</head>
<body>

<div class="container">
    <a href="index.html">← Go Back to Homepage</a>
    <h1>উচ্চতর গণিত ১ম পত্র সিলেবাস</h1>

    <p style="color:#666;font-size:1.1rem;margin-bottom:20px;">
        চ্যাপ্টার শেষ হলে বক্সে টিক চিহ্ন দাও
    </p>

    <!-- PROGRESS BAR -->
    <div class="progress-container" style="background:#eee;border-radius:10px;margin:20px 0;height:20px;width:100%;">
        <div id="progress-bar" style="background:#2ecc71;height:20px;width:0%;border-radius:10px;transition:width 0.3s;"></div>
    </div>

    <p id="progress-text" style="font-weight:bold;color:#27ae60;">Progress: 0%</p>

    <ul class="syllabus-list">
        <li><input type="checkbox" id="math-ch1" class="save-cb"> ম্যাট্রিক্স ও নির্ণায়ক <a href="https://youtu.be/KtqyZ-ANMUk?si=frHK4MCwQT1_Q55F" target="_blank" style="text-decoration:none; margin-left:10px;">🔗</a></li>
        <li><input type="checkbox" id="math-ch2" class="save-cb"> সরলরেখা <a href="https://youtube.com/playlist?list=PL4XrhAetwHqEg4CmE2jRO9lUCT-Y6cvvp&si=Kc-aukKW6p-FXIes" target="_blank" style="text-decoration:none; margin-left:10px;">🔗</a></li>
        <li><input type="checkbox" id="math-ch3" class="save-cb"> বৃত্ত <a href="https://youtube.com/playlist?list=PLi5fEbOt0If4H7IkfjLu_wz4FMLLjWvHy&si=UZeADft7O5ETJ6Vx" target="_blank" style="text-decoration:none; margin-left:10px;">🔗</a></li>
        <li><input type="checkbox" id="math-ch4" class="save-cb"> সংযুক্ত কোণের ত্রিকোণমিতিক অনুপাত <a href="https://youtube.com/playlist?list=PLXVDhFlxdHuHlLNxiRdB8YX7JKSjOEp8q&si=151Y4iICv_5_-1Le" target="_blank" style="text-decoration:none; margin-left:10px;">🔗</a></li>
        <li><input type="checkbox" id="math-ch5" class="save-cb"> অন্তরীকরণ <a href="https://youtube.com/playlist?list=PL4XrhAetwHqGQm0nWooXdj3OwykPsl_ul&si=GKr3mkmZhToGjJBt" target="_blank" style="text-decoration:none; margin-left:10px;">🔗</a></li>
        <li><input type="checkbox" id="math-ch6" class="save-cb"> যোগজীকরণ <a href="https://youtube.com/playlist?list=PL4XrhAetwHqHcmYYGLCwZ3_W9o_du--QX&si=CQaAL18rMuN0-VCt" target="_blank" style="text-decoration:none; margin-left:10px;">🔗</a></li>
    </ul>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCzKl7JcSA74VUKlObhzeATfNjmqHoeKoo",
  authDomain: "studytool-17d4e.firebaseapp.com",
  projectId: "studytool-17d4e",
  storageBucket: "studytool-17d4e.firebasestorage.app",
  messagingSenderId: "380448981289",
  appId: "1:380448981289:web:5dec498bbb8c6f99177738"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// --- UNIQUE USER LOGIC ---
let userId = localStorage.getItem("study_uid");
if (!userId) {
    userId = "user_" + Math.random().toString(36).substr(2, 9);
    localStorage.setItem("study_uid", userId);
}

const checkboxes = document.querySelectorAll('.save-cb');
const progressBar = document.getElementById('progress-bar');
const progressText = document.getElementById('progress-text');

function updateProgress() {
    const total = checkboxes.length;
    const checked = document.querySelectorAll('.save-cb:checked').length;
    const percentage = total === 0 ? 0 : Math.round((checked / total) * 100);
    progressBar.style.width = percentage + "%";
    progressText.innerText = "Progress: " + percentage + "%";
    localStorage.setItem("math_total", percentage);
}

async function loadSavedData() {
    const promises = Array.from(checkboxes).map(async (cb) => {
        const docRef = doc(db, "user_progress", userId, "chapters", cb.id);
        try {
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) cb.checked = docSnap.data().status;
        } catch (e) {
            console.error("Error loading chapter:", cb.id, e);
        }

        cb.addEventListener('change', async () => {
            updateProgress();
            try {
                const ref = doc(db, "user_progress", userId, "chapters", cb.id);
                await setDoc(ref, { status: cb.checked });
            } catch (e) {
                console.error("Error saving data:", e);
            }
        });
    });

    await Promise.all(promises);
    updateProgress();
}

loadSavedData();
</script>

</body>
</html>
