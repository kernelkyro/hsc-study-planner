<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>তথ্য ও যোগাযোগ প্রযুক্তি</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <a href="index.html">← Go Back to Homepage</a>
    <h1>ICT সিলেবাস</h1>
    <p style="color: #666; font-size: 1.1rem; margin-bottom: 20px;">
        চ্যাপ্টার শেষ হলে বক্সে টিক চিহ্ন দাও
    </p>

    <!-- PROGRESS BAR -->
    <div class="progress-container" style="background: #eee; border-radius: 10px; margin: 20px 0; height: 20px; width: 100%;">
        <div id="progress-bar" style="background: #2ecc71; height: 100%; width: 0%; border-radius: 10px; transition: width 0.3s;"></div>
    </div>
    <p id="progress-text" style="font-weight: bold; color: #27ae60;">Progress: 0%</p>

    <ul class="syllabus-list">
        <li><input type="checkbox" id="ict-ch1" class="save-cb"> তথ্য ও যোগাযোগ প্রযুক্তি: বিশ্ব ও বাংলাদেশ প্রেক্ষিত <a href="" target="_blank">🔗</a></li>
        <li><input type="checkbox" id="ict-ch2" class="save-cb"> কমিউনিকেশন সিস্টেমস ও নেটওয়ার্কিং <a href="" target="_blank">🔗</a></li>
        <li><input type="checkbox" id="ict-ch3" class="save-cb"> সংখ্যা পদ্ধতি ও ডিজিটাল ডিভাইস <a href="" target="_blank">🔗</a></li>
        <li><input type="checkbox" id="ict-ch4" class="save-cb"> ওয়েব ডিজাইন পরিচিতি ও HTML <a href="" target="_blank">🔗</a></li>
        <li><input type="checkbox" id="ict-ch5" class="save-cb"> প্রোগ্রামিং ভাষা (C Programming) <a href="" target="_blank">🔗</a></li>
    </ul>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyCzKl7JcSA74VUKlObhzeATfNjmqHoeKoo",
    authDomain: "studytool-17d4e.firebaseapp.com",
    projectId: "studytool-17d4e",
    storageBucket: "studytool-17d4e.firebasestorage.app",
    messagingSenderId: "380448981289",
    appId: "1:380448981289:web:5dec498bbb8c6f99177738"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Unique user ID for per-user progress
let userId = localStorage.getItem("study_uid");
if(!userId){
    userId = "user_" + Math.random().toString(36).substr(2, 9);
    localStorage.setItem("study_uid", userId);
}

const checkboxes = document.querySelectorAll('.save-cb');
const progressBar = document.getElementById('progress-bar');
const progressText = document.getElementById('progress-text');

function updateProgress(){
    const total = checkboxes.length;
    const checked = document.querySelectorAll('.save-cb:checked').length;
    const percentage = total === 0 ? 0 : Math.round((checked / total) * 100);
    progressBar.style.width = percentage + "%";
    progressText.innerText = "Progress: " + percentage + "%";
}

async function loadCheckboxes(){
    const promises = Array.from(checkboxes).map(async cb => {
        const docRef = doc(db, "user_progress", userId, "chapters", cb.id);
        const docSnap = await getDoc(docRef);
        if(docSnap.exists()) cb.checked = docSnap.data().status;
        cb.addEventListener('change', async () => {
            updateProgress();
            await setDoc(doc(db, "user_progress", userId, "chapters", cb.id), {status: cb.checked});
        });
    });
    await Promise.all(promises);
    updateProgress();
}

loadCheckboxes();
</script>

</body>
</html>
